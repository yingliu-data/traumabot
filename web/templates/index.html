<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joy-Car Controller</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>Joy-Car Controller</h1>
  <span id="status-badge" class="badge disconnected">Connecting...</span>
</header>

<div id="human-warning" class="human-warning hidden">
  &#9888; HUMAN DETECTED &mdash; Movement paused
</div>

<main>
  <!-- Column 1: camera -->
  <section class="left-panel">
    <div class="camera-box">
      <img id="cam" src="/video_feed" alt="Camera feed">
      <div id="cam-overlay">No camera</div>
    </div>
  </section>

  <!-- Column 2: telemetry + controls -->
  <section class="right-panel">

    <div class="telemetry">
      <div class="telem-row"><span class="label">X</span><span id="t-x" class="value">0.0 cm</span></div>
      <div class="telem-row"><span class="label">Y</span><span id="t-y" class="value">0.0 cm</span></div>
      <div class="telem-row"><span class="label">Heading</span><span id="t-theta" class="value">0&deg;</span></div>
      <div class="telem-row"><span class="label">Speed</span><span id="t-speed" class="value">120</span></div>
    </div>

    <div class="speed-section">
      <label for="speed-slider">Speed (1&ndash;9 keys)</label>
      <input id="speed-slider" type="range" min="40" max="180" step="1" value="120">
      <div class="speed-labels"><span>Slow</span><span>Fast</span></div>
    </div>

    <div class="dpad">
      <button class="dpad-btn" data-key="ArrowUp"    style="grid-area:up">&#9650;</button>
      <button class="dpad-btn" data-key="ArrowLeft"  style="grid-area:left">&#9664;</button>
      <button class="dpad-btn" data-key="Space"      style="grid-area:center">&#9632;</button>
      <button class="dpad-btn" data-key="ArrowRight" style="grid-area:right">&#9654;</button>
      <button class="dpad-btn" data-key="ArrowDown"  style="grid-area:down">&#9660;</button>
    </div>

    <div class="goto-section">
      <h3>Go To (cm)</h3>
      <div class="goto-row">
        <label>X <input id="goto-x" type="number" value="0" step="1"></label>
        <label>Y <input id="goto-y" type="number" value="0" step="1"></label>
        <button id="btn-goto">Go</button>
      </div>
      <button id="btn-stop-all" class="stop-btn">STOP ALL</button>
    </div>

    <div class="keys-hint">
      Arrow keys / WASD to drive &bull; 1&ndash;9 to set speed &bull; Space to stop
    </div>

  </section>

  <!-- Column 3: odometry trail -->
  <section class="map-panel">
    <div class="map-section">
      <div class="map-header">
        <span>Odometry trail</span>
        <button id="btn-reset-pose">Reset</button>
      </div>
      <canvas id="map" width="300" height="300"></canvas>
    </div>
  </section>
</main>

<script src="/static/app.js"></script>
</body>
</html>
